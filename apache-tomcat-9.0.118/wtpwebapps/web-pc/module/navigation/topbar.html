<!-- Bootstrap -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">

<!-- Font Awesome 图标 -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">

<!-- jQuery -->
<script src="/plugins/jquery/js/jquery-3.2.1.min.js"></script>

<style>
/* ===== 顶部导航 ===== */

.modern-navbar {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 78px;
	z-index: 9999;

	display: flex;
	align-items: center;
	justify-content: space-between;

	padding: 0 50px;

	background: rgba(15, 23, 42, 0.72);
	backdrop-filter: blur(18px);

	border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* ===== Logo ===== */

.logo-area {
	display: flex;
	align-items: center;
	text-decoration: none;
}

.logo-icon {
	width: 42px;
	height: 42px;

	border-radius: 12px;

	background: linear-gradient(135deg,#38bdf8,#6366f1);

	display: flex;
	align-items: center;
	justify-content: center;

	color: white;
	font-size: 20px;

	margin-right: 12px;
}

.logo-text {
	font-size: 24px;
	font-weight: bold;
	letter-spacing: 1px;
	color: white;
}

/* ===== 导航菜单 ===== */

.nav-menu {
	display: flex;
	align-items: center;
	gap: 35px;
}

.nav-menu a {
	color: #cbd5e1;
	text-decoration: none;
	font-size: 16px;
	font-weight: 500;
	transition: 0.3s;
	position: relative;
}

.nav-menu a:hover {
	color: white;
}

.nav-menu a:after {
	content: "";
	position: absolute;
	left: 0;
	bottom: -8px;
	width: 0;
	height: 2px;
	background: linear-gradient(90deg,#38bdf8,#818cf8);
	transition: 0.3s;
}

.nav-menu a:hover:after {
	width: 100%;
}

/* ===== 搜索框 ===== */

.search-box {
	display: flex;
	align-items: center;

	background: rgba(255,255,255,0.06);

	padding: 10px 18px;

	border-radius: 40px;

	width: 320px;
}

.search-box input {
	background: transparent;
	border: none;
	outline: none;
	color: white;
	width: 100%;
	font-size: 14px;
}

.search-box input::placeholder {
	color: #94a3b8;
}

.search-box i {
	color: #94a3b8;
	margin-right: 10px;
}

/* ===== 用户按钮 ===== */

.user-actions {
	display: flex;
	align-items: center;
	gap: 12px;
}

.nav-btn {
	padding: 10px 22px;
	border-radius: 30px;
	text-decoration: none;
	font-size: 14px;
	font-weight: bold;
	transition: 0.3s;
}

.login-btn {
	border: 1px solid rgba(255,255,255,0.15);
	color: white;
	background: rgba(255,255,255,0.04);
}

.login-btn:hover {
	background: rgba(255,255,255,0.12);
	color: white;
	text-decoration: none;
}

.register-btn {
	background: linear-gradient(90deg,#0ea5e9,#6366f1);
	color: white;
}

.register-btn:hover {
	transform: translateY(-2px);
	box-shadow: 0 10px 25px rgba(99,102,241,0.4);
	color: white;
	text-decoration: none;
}

/* ===== 响应式 ===== */

@media screen and (max-width: 1200px) {

	.search-box {
		display: none;
	}
}

@media screen and (max-width: 900px) {

	.nav-menu {
		display: none;
	}

	.modern-navbar {
		padding: 0 20px;
	}
}
</style>

<!-- ===== 导航栏 ===== -->

<nav class="modern-navbar">

	<!-- Logo -->
	<a href="/" class="logo-area">

		<div class="logo-icon">
			<i class="fa fa-code"></i>
		</div>

		<div class="logo-text">
			NovaTech
		</div>

	</a>

	<!-- 菜单 -->
	<div class="nav-menu">

		<a href="/">首页</a>

		<a href="/module/blog.hms">技术文章</a>

		<a href="/module/code.hms">开源项目</a>

		<a href="/module/ai.hms">AI专区</a>

		<a href="/module/resource.hms">资源库</a>

		<a href="/module/about.hms">关于</a>

	</div>

	<!-- 搜索 -->
	<div class="search-box">

		<i class="fa fa-search"></i>

		<input type="text" placeholder="搜索文章 / 代码 / AI 内容">

	</div>

	<!-- 用户操作 -->
	<div class="user-actions">

		<a href="#" class="nav-btn login-btn">
			登录
		</a>

		<a href="#" class="nav-btn register-btn">
			开始使用
		</a>

	</div>

</nav>
